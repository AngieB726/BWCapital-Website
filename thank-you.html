<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You — Black & White Capital</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
    .thank-you {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(180deg, #ffffff 0%, #f4f1ec 100%);
        padding: 60px 24px;
        text-align: center;
    }
    .thank-you-card {
        max-width: 620px;
    }
    .thank-you .brand-monogram {
        justify-content: center;
        margin-bottom: 6px;
    }
    .thank-you .brand-text {
        text-align: center;
    }
    .thank-you-title {
        font-family: var(--serif);
        font-size: 56px;
        font-weight: 600;
        color: var(--gold);
        margin: 40px 0 20px;
        line-height: 1.1;
    }
    .thank-you-text {
        color: var(--gray-700);
        font-size: 16px;
        line-height: 1.8;
        margin: 0 auto 36px;
        max-width: 480px;
    }
    .thank-you-divider {
        width: 60px;
        height: 1px;
        background: var(--gold);
        margin: 30px auto;
    }
    .thank-you .contact-line {
        color: var(--gray-700);
        font-size: 14px;
        margin-bottom: 8px;
        letter-spacing: 0.5px;
    }
    .thank-you .contact-line a {
        color: var(--gold);
        font-weight: 600;
    }
</style>
</head>
<body>

<div class="thank-you">
    <div class="thank-you-card">
        <div class="brand-monogram" style="color: var(--dark);">
            <span class="b">B</span><span class="amp">/</span><span class="w">W</span>
        </div>
        <div class="brand-text">
            <div class="brand-name">BLACK &amp; WHITE</div>
            <div class="brand-sub" style="display:inline-block;">CAPITAL</div>
        </div>

        <h1 class="thank-you-title">Thank You.</h1>

        <p class="thank-you-text">
            Your inquiry has been received. A member of our team
            will review your message and be in touch within
            1&ndash;2 business days.
        </p>

        <div class="thank-you-divider"></div>

        <p class="contact-line">For urgent matters, please contact us directly:</p>
        <p class="contact-line"><a href="tel:2018875775">201-887-5775</a> &nbsp;&middot;&nbsp; <a href="mailto:Christine@BWCapital.org">Christine@BWCapital.org</a></p>

        <div style="margin-top: 50px;">
            <a href="index.html" class="btn btn-primary">
                RETURN TO HOMEPAGE <span class="arrow">&rarr;</span>
            </a>
        </div>
    </div>
</div>

</body>
</html>
